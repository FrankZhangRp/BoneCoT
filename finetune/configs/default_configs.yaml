data:
  train_dataset: ".txt"
  val_dataset: ".txt"
  test_dataset: ".txt"
  batch_size: 128
  num_workers: 16
  o1_extra_feature_dim: 34
compute_precision:
  grad_scaler: true
  teacher:
    backbone:
      sharding_strategy: SHARD_GRAD_OP
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
  student:
    backbone:
      sharding_strategy: SHARD_GRAD_OP
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
train:
  saveckp_freq: 20
  seed: 0
  centering: "sinkhorn_knopp" # or "sinkhorn_knopp"
model:
  arch: vit_giant2
  patch_size: 14
  num_classes: 17
  drop_path_rate: 0.4
  layerscale: 1.0e-05
  drop_path_uniform: true
  pretrained_weights: ''
  ffn_layer: "swiglufused"
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  num_register_tokens: 4
  interpolate_antialias: true
  interpolate_offset: 0.0
  momentum_teacher: 0.994
  final_momentum_teacher: 1
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30
optim:
  epochs: 100
  step_per_epoch: -1
  o1_change01: False
  o1_label_smooth: 0
  o1_dropout: 0
  use_amp: true # 使用半精度
  optimizer: adamw # adamw sgd
  sgd_momentum: 0.9
  lr_scheduler: cosine # step warmup
  loss_type: 'CE' # 损失函数 CE BCE Focal loss
  weight_decay: 0.2
  weight_decay_end: 0.4
  lr: 1e-4  # will be set after applying scaling rule
  warmup_epochs: 10
  min_lr: 1.0e-06
  clip_grad: 3.0
  patch_embed_lr_mult: 0.2
  layerwise_decay: 1.0
  adamw_beta1: 0.9
  adamw_beta2: 0.999
crops:
  global_crops_scale:
  - 0.32
  - 1.0
  local_crops_number: 8
  local_crops_scale:
  - 0.05
  - 0.32
  global_crops_size: 224
  local_crops_size: 98